    - name: Relic of the Matriarch - The Fiery Heart (Aura)
      text: While a friendly Adepta Sororitas unit is within 6" of this model, add 2" to that unit's Move
        characteristic and add 1 to the Advance and Charge rolls made for that unit.
    - name: Relic of the Matriarch - Censer of the Sacred Rose (Aura)
      text: While a friendly Adepta Sororitas unit is within 6" of this model, you can re-roll all Battle-shock
        tests taken for that unit.
    - name: Relic of the Matriarch - Simulacrum of the Ebon Chalice (Aura)
      text: While a friendly Adepta Sororitas unit is within 6" of this model, that unit can perform up
        to two Acts of Faith per phase, instead of only one.
    - name: Relic of the Matriarch - Simulacrum of the Argent Shroud (Aura)
      text: While a friendly Adepta Sororitas unit is within 6" of this model, each time a model in that
        unit makes a ranged attack, re-roll a Wound roll of 1.
    - name: Relic of the Matriarch - Icon of the Valorous Heart (Aura)
      text: While a friendly Adepta Sororitas unit is within 6" of this model, models in that unit have
        the Feel No Pain 6+ ability.
    - name: Relic of the Matriarch - Petals of the Bloody Rose (Aura)
      text: While a friendly Adepta Sororitas unit is within 6" of this model, improve the Armour Penetration
        characteristic of melee weapons equipped by model in that unit by 1.
    - name: Solemn Procession
