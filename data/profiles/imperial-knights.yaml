# Imperial Knights datasheet profiles (11th ed).
# Transcribed from the Imperial Knights Faction Pack v1.1 datasheets
# (docs/ik_faction_pack_v1.1.pdf, pages 7-26). This pack contains only the
# Knight Destrier + the 9 Imperial Armour / Forge World datasheets; the core
# Codex knights (Paladin, Crusader, Castellan, etc.) are NOT here -- their
# profiles remain a gap until the Codex is sourced.
#
# Conventions:
#   stats: M in inches (int), T/W/OC ints, Sv/Ld as "N+" strings.
#   invuln: save string; invuln_ranged_only true = "* against ranged only".
#   weapons: range in inches (ranged only); A/S/AP/D are ints, or strings when
#            they use dice (e.g. "D6+3"); BS/WS as "N+"/"N/A"; abilities = the
#            [BRACKETED] weapon keywords.
#
# NOTE: hand-transcribed from PDF images -- worth a spot-check against the
# physical datasheets. Low-confidence values are flagged with `verify: true`.

- name: Knight Destrier
  source: faction-pack-1.1
  stats: {M: 12, T: 10, Sv: "3+", W: 18, Ld: "6+", OC: 8}
  invuln: "5+"
  invuln_ranged_only: true
  ranged:
    - {name: Chastiser gatling cannon, range: 24, A: 12, BS: "3+", S: 6, AP: -1, D: 2, abilities: [ASSAULT]}
    - {name: Frag bombard, range: 24, A: "D6+3", BS: "3+", S: 7, AP: -1, D: 2, abilities: [ASSAULT, BLAST, "RAPID FIRE D6+3"]}
    - {name: Questoris heavy stubber, range: 36, A: 6, BS: "3+", S: 4, AP: -1, D: 1, abilities: [ASSAULT, "RAPID FIRE 3"]}
  melee:
    - {name: Bellatus reaper chainsword - strike, A: 5, WS: "3+", S: 12, AP: -3, D: "D3+3"}
    - {name: Bellatus reaper chainsword - sweep, A: 10, WS: "3+", S: 8, AP: -2, D: 2}
    - {name: Thundershock spear - strike, A: 4, WS: "3+", S: 12, AP: -3, D: "D3+3", abilities: [LANCE]}
    - {name: Thundershock spear - sweep, A: 8, WS: "3+", S: 6, AP: -3, D: 2, abilities: [LANCE]}
    - {name: Titanic feet, A: 4, WS: "4+", S: 7, AP: -1, D: 2}
  abilities:
    core: [Deadly Demise D6]
    faction: [Code Chivalric, Super-heavy Walker]
    datasheet:
      - {name: Ram Jets, text: "Each time this unit is selected to make a Normal or Advance move, until the end of the phase, add D3\" to the Move characteristic of this model."}
      - {name: Thundercharge, text: "If this model is equipped with a thundershock spear and a bellatus reaper chainsword, add 2 to the Attacks characteristic of melee weapons equipped by this model."}
      - {name: Saturation Fire, text: "Each time this model makes a ranged attack that targets a unit within range of one or more objective markers, that attack has the [IGNORES COVER] ability."}
  damaged: {threshold: "1-6", text: "Subtract 4 from this model's Objective Control characteristic and each time this model makes an attack, subtract 1 from the Hit roll."}
  keywords: [Vehicle, Walker, Titanic, Towering, Bellatus, Character, Imperium, Knight Destrier]
  wargear_options:
    - "This model's chastiser gatling cannon can be replaced with 1 bellatus reaper chainsword* or 1 thundershock spear*."
    - "This model's frag bombard can be replaced with 1 bellatus reaper chainsword* or 1 thundershock spear*."
    - "* A model cannot be equipped with more than one bellatus reaper chainsword or more than one thundershock spear."
  equipped: "1 chastiser gatling cannon; 1 frag bombard; 1 Questoris heavy stubber; 1 titanic feet"

