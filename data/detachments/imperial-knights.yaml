# Imperial Knights detachments (11th edition).
#
# Rules/enhancements/stratagems for the four detachments below are transcribed
# from the Imperial Knights Faction Pack v1.1 (legal from 22 Jul 2026),
# docs/ik_faction_pack_v1.1.pdf.
#
# `disposition` and `dp` (Detachment Point cost, 1/2/3) are NOT in the faction
# pack. They were extracted from 39k.pro's embedded dataset (Vite bundle
# /assets/index-*.js), tables `force_disposition` (id->name) and
# `detachment_force_disposition` (detachmentId->forceDispositionId), joined to
# the detachment records (which carry `detachmentPointsCost`).
# NOTE: the 39k.pro snapshot predates faction pack v1.1, so it does NOT include
# Dominus Foebreakers -- its dp/disposition remain TODO.
#
# Base-Codex detachments (Questoris Companions, Gate Warden Lance, Valourstrike
# Lance, Spearhead-at-Arms) have dp + disposition below but their full
# rules/enhancements/stratagems are still TODO (in the Codex, not the pack;
# 39k.pro has the rich text and can be scraped next).

faction: Imperial Knights
faction_keyword: IMPERIAL KNIGHTS

detachments:
  - key: dominus-foebreakers
    name: Dominus Foebreakers
    source: faction-pack-1.1
    disposition: priority-assets   # user (authoritative; not in 39k.pro snapshot)
    dp: 1                          # user
    rule:
      name: Rain of Devastation
      text: >-
        Friendly IMPERIAL KNIGHTS DOMINUS units' attacks that target a unit in a
        terrain area have +1 to hit rolls.
    enhancements:
      - name: Blessed Plate
        points: 30
        text: IMPERIAL KNIGHTS DOMINUS model only. This model has +1 Toughness.
      - name: Archeotech Autoloaders
        points: 25
        text: >-
          IMPERIAL KNIGHTS DOMINUS model only. This unit can re-roll rolls to
          determine the Attacks (A) of a weapon.
    stratagems:
      - name: Ground-Shaking Strides
        cp: 1
        when: Your Movement phase, when a friendly IMPERIAL KNIGHTS DOMINUS unit is selected to move.
        target: That IMPERIAL KNIGHTS DOMINUS unit.
        effect: Your unit has +2" Move (M).
      - name: Foebreaker Firestorm
        cp: 1
        when: Your Shooting phase, when a friendly engaged IMPERIAL KNIGHTS DOMINUS unit is selected to shoot.
        target: That IMPERIAL KNIGHTS DOMINUS unit.
        effect: >-
          Your unit's [BLAST] ranged attacks do not have [BLAST], and have +1 Attacks (A).
      - name: Fire Shocked
        cp: 1
        when: Your Shooting phase, when a friendly IMPERIAL KNIGHTS DOMINUS unit has shot.
        target: That IMPERIAL KNIGHTS DOMINUS unit.
        effect: >-
          Select one enemy unit hit by those attacks. That enemy unit makes a
          battle-shock roll with -1 to that battle-shock roll.

  - key: questor-forgepact
    name: Questor Forgepact
    source: faction-pack-1.1
    disposition: disruption   # 39k.pro
    dp: 1                      # 39k.pro
    rule:
      name: Cogbound Alliance
      text: >-
        Friendly IMPERIAL KNIGHTS models gain Assisted Targeting (Aura): while a
        friendly ADEPTUS MECHANICUS unit is within 6", that Admech unit's ranged
        attacks have +1 BS and [HEAVY]. Friendly TECH-PRIEST models gain
        Sacristan Pledge: in your Command phase select one friendly IMPERIAL
        KNIGHTS model within 3" not already selected this phase; it heals D3
        wounds. Mechanicus Allies: you may include TECH-PRIEST DOMINUS /
        MANIPULUS / MARSHAL / RANGERS / VANGUARD units (Codex: Adeptus
        Mechanicus); combined points of such units cannot exceed 500.
    enhancements:
      - name: Magos Questoris
        points: 20
        text: >-
          TECH-PRIEST model only. When using this model's Sacristan Pledge, the
          selected IMPERIAL KNIGHTS model heals 2 additional wounds.
      - name: Knight of the Opus Machina (Aura)
        points: 15
        text: >-
          IMPERIAL KNIGHTS model only. While a friendly ADEPTUS MECHANICUS unit
          is within 6", that unit's melee attacks have +1 WS and +1 AP.
    stratagems:
      - name: Omnissiah's Grace
        cp: 1
        when: Any phase, when a friendly IMPERIAL KNIGHTS unit suffers a mortal wound.
        target: That IMPERIAL KNIGHTS unit.
        effect: Your unit has Feel No Pain 5+ against mortal wounds.
      - name: Vengeance of the Machine Cult
        cp: 1
        when: Any phase, when a friendly IMPERIAL KNIGHTS TITANIC unit is destroyed by an enemy unit.
        target: One friendly ADEPTUS MECHANICUS unit.
        effect: >-
          That enemy unit is marked until end of battle. While a unit is marked,
          friendly ADEPTUS MECHANICUS units that target it can re-roll wound rolls.
      - name: In the Shadow of Giants
        cp: 1
        when: Your Movement phase, when a friendly ADEPTUS MECHANICUS unit is selected to make an advance/fall-back move.
        target: That ADEPTUS MECHANICUS unit.
        effect: That move does not prevent your unit from being eligible to start an action.

  - key: throne-bonded-outriders
    name: Throne-bonded Outriders
    source: faction-pack-1.1
    unique: ARMIGERS   # cannot be taken with another ARMIGERS detachment
    disposition: reconnaissance   # 39k.pro
    dp: 1                         # 39k.pro
    rule:
      name: Driven from their Lairs
      text: >-
        While a friendly ARMIGER unit is affected by a Bondsman ability, that
        unit's ranged attacks have [IGNORES COVER].
    enhancements:
      - name: Gyro-optimised Actuators
        points: 15
        upgrade: true
        text: ARMIGER unit only. This unit has MOBILE.
      - name: Ancestral Overbleed
        points: 10
        upgrade: true
        text: >-
          ARMIGER unit only. When you target this unit with the Fire Overwatch /
          Heroic Intervention stratagem, that use is -1 CP.
    stratagems:
      - name: Neural Lash
        cp: 1
        when: Command phase.
        target: One friendly IMPERIAL KNIGHTS TITANIC unit.
        effect: >-
          Select one friendly battle-shocked ARMIGER unit within 12" of your
          unit. That ARMIGER unit is no longer battle-shocked.
      - name: Helm Conditioning
        cp: 1
        when: Your Command phase, when a friendly IMPERIAL KNIGHTS unit uses a Bondsman ability.
        target: That IMPERIAL KNIGHTS unit.
        effect: >-
          When selecting an ARMIGER model for that Bondsman ability, you can
          select one within 18" of your unit (excluding models already affected
          by a Bondsman ability).
      - name: Honoured to Serve
        cp: 1
        when: Your Shooting phase, when a friendly ARMIGER unit has shot.
        target: That ARMIGER unit.
        effect: Those attacks do not prevent your unit from being eligible to start an action.

  - key: freeblade-company
    name: Freeblade Company
    source: faction-pack-1.1
    disposition: priority-assets   # user (authoritative; 39k.pro snapshot said purge-the-foe)
    dp: 3                          # 39k.pro
    rule:
      name: Knights of Legend
      text: >-
        IMPERIAL KNIGHTS models from your army have the Feel No Pain 6+ ability.
        In addition, at the start of your Command phase, each IMPERIAL KNIGHTS
        model from your army regains 1 lost wound.
    enhancements:
      - name: Mysterious Guardian
        points: 35
        text: >-
          IMPERIAL KNIGHTS model only. Once per battle, per army, at the end of
          your opponent's turn, if this unit is unengaged you can: place it in
          strategic reserves; it has Deep Strike until the start of your next
          Shooting phase; and it must make an ingress move in your next Movement
          phase (including your first turn).
      - name: Sanctuary
        points: 20
        text: IMPERIAL KNIGHTS model only. The bearer has a 5+ invulnerable save.
      - name: Bringer of Justice
        points: 30
        text: >-
          IMPERIAL KNIGHTS model only. Improve the Attacks of melee weapons
          equipped by the bearer by 2, and each time the bearer makes a melee
          attack, add 1 to the Hit roll.
      - name: Hunter's Eye
        points: 25
        text: >-
          IMPERIAL KNIGHTS model only. Ranged weapons equipped by the bearer
          have the [IGNORES COVER] ability.
    stratagems:
      - name: Noble Sacrifice
        cp: 1
        type: Epic Deed
        when: Any phase.
        target: One IMPERIAL KNIGHTS unit from your army that was just destroyed.
        effect: >-
          Your unit's Deadly Demise inflicts mortal wounds on a D6 roll of 4+
          (adding 1 to the result if it is an ARMIGER unit), instead of only a 6.
      - name: Strength from Exile
        cp: 1
        type: Battle Tactic
        when: Your Shooting phase or the Fight phase.
        target: One IMPERIAL KNIGHTS unit from your army that has not been selected to shoot or fight this phase.
        effect: >-
          If there are no other friendly units within 9" of your unit, re-roll a
          Hit roll of 1 and re-roll a Wound roll of 1 for each attack.
      - name: Full Tilt
        cp: 1
        type: Wargear
        when: Your Movement phase.
        target: One IMPERIAL KNIGHTS unit from your army.
        effect: >-
          If your unit Advances, do not make an Advance roll; instead add 6" to
          Move (or 9" if the unit is an ARMIGER or DESTRIER).
      - name: Point-Blank Barrage
        cp: 1
        type: Strategic Ploy
        when: Your Shooting phase.
        target: One IMPERIAL KNIGHTS unit from your army not selected to shoot this phase.
        effect: >-
          Blast weapons may target enemy units within Engagement Range of your
          unit (if no other friendly units are also within ER of that enemy),
          and your unit ignores the Hit penalty for being within ER; but each
          Blast-weapon attack targeting a unit within ER inflicts 1 mortal wound
          on your unit (on an unmodified Hit roll of 1) after attacks resolve.
      - name: Survivor of Strife
        cp: 1
        type: Epic Deed
        when: Your opponent's Shooting phase, just after an enemy unit has selected its targets.
        target: One IMPERIAL KNIGHTS unit from your army selected as a target.
        effect: >-
          Each time an attack targets your unit, if the attack's Strength is
          greater than your unit's Toughness, subtract 1 from the Wound roll.
      - name: Flanking Manoeuvres
        cp: 1
        type: Strategic Ploy
        when: End of your opponent's Fight phase.
        target: One ARMIGER unit within 9" of a battlefield edge and not within Engagement Range of any enemy.
        effect: Remove your unit from the battlefield and place it into Strategic Reserves.
  # ---- Base-Codex detachments ----
  # rule / enhancements / stratagems scraped from the 39k.pro bundle
  # (tables detachment_rule + rule_container_component, enhancement, stratagem).
  # dp from 39k.pro; disposition per user's authoritative list (2026-07-22) --
  # note Gate Warden Lance = take-and-hold (39k snapshot was stale on this).
  - key: questoris-companions
    name: Questoris Companions
    source: codex
    disposition: take-and-hold
    dp: 3
    rule:
      name: Heroes of Legend
      text: 'At the start of your turn, if your current Oath is fulfilled, determine an additional Oath
        as described in Army Rules, with the exception that you cannot select a Deed or Quality you have
        already selected (if you are randomly selecting the Deed and/or Quality and roll any result that
        you have already selected, select a Deed or Quality you have not already selected instead). If you
        cannot determine an additional Oath because you have already selected each Deed and each Quality,
        do not determine an additional Oath.


        The Qualities from Oaths you have fulfilled continue to apply to all models in your army with the
        Code Chivalric ability. When the Deed for an additional Oath is completed, you instead gain 1CP,
        regardless of how you selected the Deed or Quality.'
      lore: To those who quest for honour – in service to their liege, to avenge atrocities, to wipe clean
        the stain of disfavour – there can be no end. The Imperium’s foes are legion, an endless horde from
        which more arise. As one quest ends, another always begins.
    enhancements:
    - name: Herald of Triumph
      points: 15
      text: '**IMPERIAL KNIGHTS** model only. When the bearer ends a Charge move, it can use this Enhancement.
        If it does, this Enhancement is expended, then each enemy unit within Engagement Range of the bearer
        must take a Battle-shock test, subtracting 1 from the result.'
    - name: Wyrmslayer Divination
      points: 10
      text: '**IMPERIAL KNIGHTS** model only. In your Shooting phase, when the bearer is selected to shoot,
        it can use this Enhancement. If it does, this Enhancement is expended, then until the end of the
        phase, each time it makes an attack that targets a unit that can **FLY**, you can re-roll the Hit
        roll.'
    - name: Pennant of Silvered Fury
      points: 15
      text: '**IMPERIAL KNIGHTS** model only. When the bearer is selected to fight, it can use this Enhancement.
        If it does, this Enhancement is expended, then until the end of the phase, melee weapons equipped
        by the bearer have the **[SUSTAINED HITS 2]** ability.'
    - name: Crushing Condemnation
      points: 10
      text: '**IMPERIAL KNIGHTS** model only. When the bearer is selected to fight, after resolving its
        attacks, if one or more enemy units were destroyed by those attacks, the bearer can use this Enhancement.
        If it does, this Enhancement is expended, then select one enemy unit that is not within Engagement
        Range of any units from your army and is within 12" of and visible to the bearer. Roll six D6: for
        each 4+, that enemy unit suffers 1 mortal wound.'
    stratagems:
    - name: Courageous Stand
      cp: 1
      type: Epic Deed
      when: Your opponent’s Shooting phase or the Fight phase, just after an enemy unit has selected its
        targets.
      target: One **IMPERIAL KNIGHTS TITANIC** unit from your army that was selected as the target of one
        or more of the attacking unit’s attacks.
      effect: Until the end of the phase, models in your unit have the Feel No Pain 6+ ability.
    - name: Titanic Duel
      cp: 1
      type: Epic Deed
      when: Your Shooting phase or the Fight phase.
      target: One **IMPERIAL KNIGHTS TITANIC** model from your army that has not been selected to shoot
        or fight this phase.
      effect: Until the end of the phase, each time your model makes an attack that targets a **MONSTER**,
        **TITANIC** or **WALKER** unit, add 1 to the Hit roll and add 1 to the Wound roll.
    - name: Moment of Glory
      cp: 1
      type: Epic Deed
      when: Fight phase, just before an **IMPERIAL KNIGHTS TITANIC** unit from your army Consolidates.
      target: That **IMPERIAL KNIGHTS TITANIC** unit.
      effect: Until the end of the phase, each time your unit Consolidates, models in it can move an additional
        3" provided your unit can end that move within Engagement Range of one or more enemy units.
    - name: Hero’s Tread
      cp: 1
      type: Epic Deed
      when: End of your Command phase.
      target: One **IMPERIAL KNIGHTS TITANIC** model from your army that is within range of an objective
        marker you control.
      effect: Your Level of Control over that objective marker is 5 (unless it would otherwise be higher),
        until your opponent’s Level of Control over that objective marker is greater than yours at the end
        of a phase.
    - name: Unstoppable Warrior
      cp: 2
      type: Epic Deed
      when: Your Movement phase, just after an **IMPERIAL KNIGHTS TITANIC** unit from your army Falls Back.
      target: That **IMPERIAL KNIGHTS TITANIC** unit.
      effect: Until the end of the turn, your unit is eligible to shoot and declare a charge in a turn in
        which it Fell Back.
    - name: Driven By The Past
      cp: 1
      type: Epic Deed
      when: Your Charge phase.
      target: One **IMPERIAL KNIGHTS TITANIC** unit from your army.
      effect: Until the end of the turn, your unit is eligible to declare a charge in a turn in which it
        Advanced.
  - key: gate-warden-lance
    name: Gate Warden Lance
    source: codex
    disposition: take-and-hold
    dp: 2
    rule:
      name: Dauntless Defenders
      # Updated per Faction Pack v1.1 Rules Updates (supersedes the base-Codex
      # wording). Foundations are now two chosen OBJECTIVES with a "circular
      # foundation marker" placed in each; the line is closest-part to
      # closest-part between the two markers. NOTE: the faction pack does not
      # give the foundation marker a size -- the core rules define an *objective*
      # marker as a flat circular 40mm marker (measure to/from its closest part),
      # and the foundation marker inherits that convention in practice.
      # IMPORTANT: "ignore modifiers to the Hit roll" does NOT beat Benefit of
      # Cover, which worsens the BS *characteristic* (a different modifier type).
      text: |-
        At the start of the first battle round, select two objectives to be your foundations. Place a circular foundation marker in each one. When you draw a line from the closest part of one foundation marker to the closest part of the other, if any part of a model's base (or any part of a model's hull, for a model without a base) crosses that line, that model's unit is said to be on your defensive line.

        While an **IMPERIAL KNIGHTS** unit from your army is on your defensive line, that unit has the following ability:

        **Against the Horde**: Each time a model in this unit makes an attack that targets a visible enemy unit, you can ignore any or all modifiers to the Hit roll, and weapons equipped by models in this unit have the **[SUSTAINED HITS 1]** ability.
      lore: With a rigid, strategic intuition born of the unyielding fortifications defended by their ancestors,
        the Nobles of a Gate Warden Lance hold their ground with an arrogant superiority. While even one
        defends the marches of their claimed realm, they will fight to the ends of their honour to hurl
        back the besiegers.
    enhancements:
    - name: Acquisitor-at-Arms
      points: 15
      text: '**IMPERIAL KNIGHTS** model only. While the bearer is on your defensive line and there are no
        enemy units on your defensive line, add the bearer’s Objective Control characteristic to that of
        each model affected by the bearer’s Bondsman ability.'
    - name: Purgation’s Hand
      points: 20
      text: '**IMPERIAL KNIGHTS** model only. Each time the bearer makes a melee attack, if the bearer is
        on your defensive line, re-roll a Hit roll of 1 and re-roll a Wound roll of 1.'
    - name: Augury Halo
      points: 20
      text: '**IMPERIAL KNIGHTS** model only. Each time the bearer makes a ranged attack, while the bearer
        is on your defensive line, weapons equipped by the bearer have the **[IGNORES COVER]** ability.'
    - name: Vengeful Tread
      points: 15
      text: '**IMPERIAL KNIGHTS** model only. Once per turn, you can target the bearer with the Tank Shock
        Stratagem for 0CP.'
    stratagems:
    - name: Drive Them Out!
      cp: 1
      type: Battle Tactic
      when: Your Shooting phase or the Fight phase.
      target: One **IMPERIAL KNIGHTS** unit from your army that has not been selected to shoot or fight
        this phase.
      effect: Until the end of the phase, each time a model in your unit makes an attack that targets an
        enemy unit on your defensive line, an unmodified Hit roll of 5+ scores a Critical Hit.
    - name: Lancebreaker
      cp: 1
      type: Strategic Ploy
      when: Fight phase, just after an enemy unit has selected its targets.
      target: One **IMPERIAL KNIGHTS** unit from your army that was selected as the target of one or more
        of the attacking unit’s attacks and is on your defensive line.
      effect: Until the end of the phase, each time an attack targets your unit, if the Strength characteristic
        of that attack is greater than the Toughness characteristic of your unit, subtract 1 from the Wound
        roll.
    - name: Steadfast Superiority
      cp: 1
      type: Battle Tactic
      when: Fight phase.
      target: One **IMPERIAL KNIGHTS** unit from your army that is within Engagement Range of one or more
        enemy units, that is on your defensive line and that has not already been selected to fight this
        phase.
      effect: Until the end of the phase, each time a model in your unit makes an attack, you can re-roll
        the Hit roll.
    - name: Marshal the Defence
      cp: 1
      type: Battle Tactic
      when: Your Movement phase.
      target: Up to two **IMPERIAL KNIGHTS** units from your army that have not been selected to move this
        phase.
      effect: Until the end of the phase, add 3" to the Move characteristic of models in your units.
    - name: Titanic Bombardment
      cp: 1
      type: Battle Tactic
      when: Your Shooting phase.
      target: One **IMPERIAL KNIGHTS TITANIC** unit from your army that Remained Stationary this turn, that
        is on your defensive line and that has not been selected to shoot this phase.
      effect: Until the end of the phase, ranged weapons equipped by models in your unit have the **[SUSTAINED
        HITS 2]** ability.
    - name: Fortress of Intimidation
      cp: 1
      type: Epic Deed
      when: Start of your opponent’s Charge phase.
      target: One **IMPERIAL KNIGHTS TITANIC** unit from your army that is on your defensive line.
      effect: Until the end of the phase, each time an enemy unit selects your unit as a target of a charge,
        that unit must take a Battle-shock test, subtracting 1 from the result.
  - key: valourstrike-lance
    name: Valourstrike Lance
    source: codex
    disposition: purge-the-foe
    dp: 2
    rule:
      name: Bold Gallantry
      text: Each time an **IMPERIAL KNIGHTS** unit from your army Advances, until the end of the turn, ranged
        weapons equipped by **IMPERIAL KNIGHTS** models from your army have the **[ASSAULT]** ability.
      lore: With their companions beside them – kin of their blood, allies in honour – Knightly Nobles are
        inspired to near-reckless heroism. Their fervour spreads through neural interfaces to reach the
        machine spirits of their towering Knight suits. The Knights’ power cores flare with motive energy.
        Target stabilisers sputter into life, glaring balefully at the foe. Servo-motors and fibre bundles
        thrum, powering the Nobles’ steeds to a thunderous speed, such that the ground trembles.
    enhancements:
    - name: Bearer of the Iron Chalice
      points: 20
      text: '**IMPERIAL KNIGHTS** model only. At the end of your Movement phase, select one other **IMPERIAL
        KNIGHTS** model from your army that is within 12" of and visible to the bearer. That selected model
        regains up to D3 lost wounds, or up to 3 lost wounds if your army is Honoured.'
    - name: Bearer of the Evanescent Ion
      points: 15
      text: '**IMPERIAL KNIGHTS** model only. At the end of your Movement phase, select one other **IMPERIAL
        KNIGHTS** model from your army that is within 12" of and visible to the bearer. Until the start
        of your next Movement phase, that selected model has the Stealth ability.'
    - name: Bearer of the Judicant’s Helm
      points: 25
      text: '**IMPERIAL KNIGHTS** model only. At the start of your Shooting phase, select one other **IMPERIAL
        KNIGHTS** model from your army that is within 12" of and visible to the bearer. Until the end of
        the phase, ranged weapons equipped by that selected model have the **[IGNORES COVER]** ability.'
    - name: Bearer of the Lancer’s Sigil
      points: 25
      text: '**IMPERIAL KNIGHTS** model only. At the start of your Charge phase, select one other **IMPERIAL
        KNIGHTS** model from your army that is within 12” of and visible to the bearer. Until the end of
        the phase, you can re-roll Charge rolls made for that selected model.'
    stratagems:
    - name: Run Them Through!
      cp: 1
      type: Strategic Ploy
      when: Fight phase.
      target: One **IMPERIAL KNIGHTS** unit from your army that has not been selected to fight this phase.
      effect: Until the end of the phase, melee weapons equipped by your models have the **[LANCE]** ability.
    - name: Thunderstomp
      cp: 1
      type: Battle Tactic
      when: Fight phase.
      target: One **IMPERIAL KNIGHTS** model from your army that has not been selected to fight this phase.
      effect: Until the end of the phase, the Attacks characteristic of any armoured Feet melee weapons
        equipped by your model is 8, the Attacks characteristic of any titanic Feet melee weapons equipped
        by your model is 12, and improve the Armour Penetration characteristic of those weapons by 1.
    - name: Full Tilt
      cp: 2
      type: Battle Tactic
      when: Your Movement phase.
      target: One **IMPERIAL KNIGHTS** unit from your army that has not been selected to move this phase.
      effect: Until the end of the phase, add 2" to the Move characteristic of your models and add 2 to
        Advance rolls made for those model’s units.
    - name: Vow of Retribution
      cp: 1
      type: Strategic Ploy
      when: Your Shooting phase.
      target: One **IMPERIAL KNIGHTS** unit from your army that has not been selected to shoot this phase.
      effect: Until the end of the phase, ranged weapons equipped by your models have the **[LETHAL HITS]**
        ability.
    - name: Tactical Foil
      cp: 1
      type: Strategic Ploy
      when: Your opponent’s Movement phase, just after an enemy unit ends a Normal, Advance or Fall Back
        move.
      target: One **IMPERIAL KNIGHTS** model from your army that is within 8" of that unit.
      effect: Your model can make a Normal move of up to D6".
    - name: Rotate Ion Shields
      cp: 1
      type: Wargear
      when: Your opponent’s Shooting phase, just after an enemy unit has selected its targets.
      target: One **IMPERIAL KNIGHTS** unit from your army that was selected as the target of one or more
        of the attacking unit’s attacks.
      effect: Until the end of the phase, models in your unit have a 4+ invulnerable save.
  - key: spearhead-at-arms
    name: Spearhead-at-Arms
    source: codex
    disposition: reconnaissance
    dp: 2
    rule:
      name: Knightly Teachings
      text: Each time a model from your army uses its Bondsman ability, if no other model from your army
        has used that Bondsman ability that turn, you can select up to three friendly **ARMIGER** models
        (instead of one) within 12" of that model, or within 15" of that model while your army is Honoured
        (you still cannot select a model that is already being affected by a Bondsman ability). Until the
        start of your next Command phase, those models are affected by that Bondsman ability.
      lore: Knightly Nobles are exalted paragons of honour who uphold the tenets of the Code Chivalric and
        the glorious histories of their household. Through stern teachings and heroic tales, and no less
        their own deeds, they exemplify the virtues which Bondsmen aspire to emulate. It is not only in
        courtly life, upon the practice fields and during thrilling hunts that a Noble’s squires and retainers
        cleave to their duty, but also in the fiery heart of every battle. There such teachings are tested
        as never before, and also find their most lauded expressions.
    enhancements:
    - name: Mentor’s Pride
      points: 20
      text: '**IMPERIAL KNIGHTS** model only. While two or more **ARMIGER** models are under the effects
        of the bearer’s Bondsman ability, each time each of those **ARMIGER** models makes an attack, you
        can re-roll a Hit roll of 1.'
    - name: Fables of Nightmare
      points: 10
      text: '**IMPERIAL KNIGHTS** model only. While two or more **ARMIGER** models are under the effects
