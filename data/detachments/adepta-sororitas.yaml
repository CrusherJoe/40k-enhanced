# Adepta Sororitas detachments (11th ed) -- all 8 (3 codex + supplement / faction-pack).
# DP + disposition from the 39k.pro dataset; rule/enhancements/stratagems scraped from the
# 39k.pro bundle. Faction Pack Rules Updates (docs) may supersede some text -- TODO cross-check.

faction: Adepta Sororitas
faction_keyword: ADEPTA SORORITAS
detachments:
- key: hallowed-martyrs
  name: Hallowed Martyrs
  source: codex
  disposition: priority-assets
  dp: 3
  rule:
    name: The Blood of Martyrs
    text: Each time an **ADEPTA SORORITAS** model from your army makes an attack, add 1 to the Hit roll
      if that model’s unit is below its Starting Strength, and add 1 to the Wound roll as well if that
      model’s unit is Below Half-strength.
    lore: The blood of martyrs is the life force of the Imperium. So do the tenets of this Order joyously
      proclaim, and in its warriors’ darkest hour does the sacrifice of their fallen Sisters shine brightest.
  enhancements:
  - name: Saintly Example
    points: 10
    text: '**ADEPTA SORORITAS** model only. When the bearer is destroyed, you gain an additional D3 Miracle
      dice.'
  - name: Through Suffering, Strength
    points: 25
    text: '**ADEPTA SORORITAS** model only. Add 1 to the Attacks, Strength and Damage characteristics
      of the bearer’s melee weapons. If the bearer has lost one or more wounds, add 2 to the Attacks,
      Strength and Damage characteristics of the bearer’s melee weapons instead.'
  - name: Chaplet of Sacrifice
    points: 25
    text: '**ADEPTA SORORITAS** model only. At the end of your Command phase, if the bearer is on the
      battlefield, you can re-roll 1 Miracle dice from your Miracle dice pool and return it to your Miracle
      dice pool showing the new result you rolled. When doing so, if the bearer’s unit is below its Starting
      Strength, you can re-roll up to 3 Miracle dice in this way instead.'
  - name: Mantle of Ophelia
    points: 20
    text: '**CANONESS** or **PALATINE** model only. Each time an attack is allocated to the bearer, change
      the Damage characteristic of that attack to 1.'
  stratagems:
  - name: Divine Intervention
    cp: 1
    type: Epic Deed
    when: Any phase.
    target: One **ADEPTA SORORITAS CHARACTER** unit from your army that was just destroyed. You can use
      this Stratagem on that unit even though it was just destroyed.
    effect: You can discard 1‐3 Miracle dice. At the end of the phase, set the last destroyed model from
      your unit back up on the battlefield, as close as possible to where it was destroyed and not within
      Engagement Range of any enemy models. Roll one D3, adding 1 to the result for each Miracle dice
      you discarded. That model is set back up with that number of wounds remaining (up to its starting
      number of wounds).
    restriction: You cannot select **SAINT CELESTINE** as the target of this Stratagem. You cannot select
      the same **CHARACTER** as the target of this Stratagem more than once per battle.
  - name: Suffering and Sacrifice
    cp: 1
    type: Strategic Ploy
    when: Start of the Fight phase.
    target: One **ADEPTA SORORITAS INFANTRY** or **ADEPTA SORORITAS WALKER** unit from your army.
    effect: Until the end of the phase, each time an enemy model within Engagement Range of your unit
      selects its targets, it must select your unit as the target of its attacks.
  - name: Righteous Vengeance
    cp: 1
    type: Battle Tactic
    when: Fight phase.
    target: One **ADEPTA SORORITAS** unit from your army that has not been selected to fight this phase.
    effect: Until the end of the phase, each time a model in your unit makes a melee attack, you can re-roll
      the Hit roll and, if your unit is Below Half-strength, you can re-roll the Wound roll as well.
  - name: Sanctified Immolation
    cp: 1
    type: Strategic Ploy
    when: Any phase.
    target: One **ADEPTA SORORITAS VEHICLE** model from your army with the Deadly Demise ability that
      was just destroyed. You can use this Stratagem on that model even though it was just destroyed.
    effect: Do not roll one D6 to determine whether mortal wounds are inflicted by your model’s Deadly
      Demise ability. Instead, mortal wounds are automatically inflicted.
  - name: Spirit of the Martyr
    cp: 2
    type: Strategic Ploy
    when: Fight phase, just after an enemy unit has selected its targets.
    target: One **ADEPTA SORORITAS** unit from your army that was selected as the target of one or more
      of the attacking unit’s attacks.
    effect: Until the end of the phase, each time a model in your unit is destroyed, if that model has
      not fought this phase, do not remove it from play. The destroyed model can fight after the attacking
      unit has finished making its attacks, and is then removed from play.
  - name: Praise the Fallen
    cp: 1
    type: Strategic Ploy
    when: Your opponent’s Shooting phase, just after an enemy unit has shot.
    target: One **ADEPTA SORORITAS** unit from your army that had one or more of its models destroyed
      as a result of the attacking unit’s attacks.
    effect: Your unit can shoot as if it were your Shooting phase, but it must target only that enemy
      unit when doing so, and can only do so if that enemy unit is an eligible target.
- key: bringers-of-flame
  name: Bringers of Flame
  source: codex
  disposition: purge-the-foe
  dp: 3
  rule:
    name: Fervent Purgation
    text: Ranged weapons equipped by **ADEPTA SORORITAS** models from your army have the **[ASSAULT]**
      ability, and each time an attack made with such a weapon targets a unit within 6", add 1 to the
      Strength characteristic of that attack.
    lore: These warriors carry the fiery wrath of the Emperor into the darkest corners of his realm. Through
      the weapons of the faithful is the Master of Mankind’s immortal anger made manifest. With the holy
      trinity of boltgun, flamer and melta weapons are his enemies purged from the Imperium’s worlds.
  enhancements:
  - name: Righteous Rage
    points: 15
    text: '**ADEPTA SORORITAS** model only. Each time the bearer is selected to fight, you can first discard
      up to 3 Miracle dice. For each Miracle dice just discarded, until the end of the phase, add 1 to
      the Attacks and Strength characteristics of the bearer’s melee weapons.'
  - name: Manual of Saint Griselda
    points: 20
    text: '**ADEPTA SORORITAS** model only. At the start of your Command phase, you can discard up to
      2 Miracle dice. Then, add 1 Miracle dice to your Miracle Dice pool showing a value equal to the
      sum of the two Miracle dice you just discarded (to a maximum of 6).'
  - name: Fire and Fury
    points: 30
    text: '**ADEPTA SORORITAS** model only. While the bearer is leading a unit, add 1 to the Attacks characteristic
      of Torrent weapons equipped by models in that unit, and all other ranged weapons equipped by models
      in that unit have the **[SUSTAINED HITS 1]** ability.'
  - name: Iron Surplice of Saint Istalela
    points: 10
    text: '**CANONESS** or **PALATINE** model only. The bearer has a Save characteristic of 2+ and the
      Feel No Pain 5+ ability.'
  stratagems:
  - name: Shield of Aversion
    cp: 1
    type: Battle Tactic
    when: Your opponent’s Shooting phase or the Fight phase, just after an enemy unit has selected its
      targets.
    target: One **ADEPTA SORORITAS** unit from your army that was selected as the target of one or more
      of the attacking unit’s attacks.
    effect: Until the attacking unit has finished making its attacks, each time an attack targets your
      unit, worsen the Armour Penetration characteristic of that attack by 1.
  - name: Righteous Blows
    cp: 1
    type: Battle Tactic
    when: Fight phase.
    target: One **ADEPTA SORORITAS** unit from your army that has not been selected to fight this phase.
    effect: Until the end of the phase, melee weapons equipped by models in your unit have the **[LETHAL
      HITS]** ability. If one or more enemy models are destroyed as the result of attacks made by those
      weapons this phase, select one of those destroyed models; that destroyed model’s unit must take
      a Battle-shock test.
  - name: Carry Forth the Faithful
    cp: 1
    type: Strategic Ploy
    when: Your Movement phase, just before an **ADEPTA SORORITAS TRANSPORT** model from your army Advances.
    target: That **ADEPTA SORORITAS TRANSPORT** model.
    effect: Until the end of the turn, you can re-roll Advance rolls made for your **TRANSPORT**, and
      units can disembark from your **TRANSPORT** even though it Advanced. Units that do so count as having
      made a Normal move, and cannot declare a charge this turn.
  - name: Cleansing Flames
    cp: 2
    type: Battle Tactic
    when: Your Shooting phase.
    target: One **ADEPTA SORORITAS** unit from your army that has not been selected to shoot this phase.
    effect: Until the end of the phase, Torrent weapons equipped by models in your unit have the **[DEVASTATING
      WOUNDS]** ability.
  - name: Rites of Fire
    cp: 1
    type: Battle Tactic
    when: Your Shooting phase.
    target: One **ADEPTA SORORITAS** unit from your army that disembarked from a **TRANSPORT** this turn
      and has not been selected to shoot this phase.
    effect: Until the end of the phase, each time a model in your unit makes a ranged attack that targets
      an enemy unit within 6" that is also within range of an objective marker, add 1 to the Wound roll.
      If one or more enemy models are destroyed as the result of those attacks, select one of those destroyed
      models; that destroyed model’s unit must take a Battle-shock test.
  - name: Blazing Ire
    cp: 2
    type: Battle Tactic
    when: Your opponent’s Shooting phase, just after an enemy unit has shot.
    target: One **ADEPTA SORORITAS TRANSPORT** unit from your army that was selected as the target of
      one or more of the attacking unit’s attacks.
    effect: One unit embarked within your **TRANSPORT** can disembark as if it were your Movement phase,
      and can then shoot as if it were your Shooting phase, but must target only that enemy unit when
      doing so, and can only do so if that enemy unit is an eligible target.
- key: champions-of-faith
  name: Champions of Faith
  source: codex
  disposition: disruption
  dp: 2
  rule:
    name: Righteous Purpose
    text: 'In your Command phase, you can select up to 3 **ADEPTA SORORITAS** units from your army (including
      units that are embarked within **TRANSPORTS**), until the start of your next Command phase, those
      units are Righteous. While a unit is Righteous:


      ■ Add 1" to the Move characteristic of models in that unit.

      ■ Improve the Leadership characteristic of models in that unit by 1.

      ■ Improve the Weapon Skill and Ballistic Skill characteristics of weapons equipped by **BATTLE SISTERS
      SQUAD**, **CELESTIAN SACRESANTS** and **PARAGON WARSUITS** models in that unit by 1.'
    lore: Whether high-ranking clergy must be rescued, a priceless relic recovered, or some archheretic
      slain, these warriors know that to fail after promising victory to the God-Emperor would be infinitely
      worse than death; this knowledge fills them with righteous purpose and the unflinching will to succeed
      no matter the odds.
  enhancements:
  - name: Triptych of Judgement
    points: 15
    text: '**ADEPTA SORORITAS** model only. Each time a model in the bearer’s unit makes an attack, you
      can ignore any or all modifiers to that attack’s Ballistic Skill or Weapon Skill characteristics
      and/or any or all modifiers to the Hit roll.'
  - name: Mark of Devotion
    points: 30
    text: '**ADEPTA SORORITAS** model only. Add 1 to the Attacks characteristic of the bearer’s melee
      weapons. While the bearer’s unit is Righteous, add 2 to the Attacks characteristic and add 1 to
      the Damage characteristic of the bearer’s melee weapons instead.'
  - name: Eyes of the Oracle
    points: 10
    text: '**ADEPTA SORORITAS** model only. The bearer’s weapons have the **[PRECISION]** ability. Each
      time the bearer’s unit destroys an enemy **CHARACTER** model, you gain 1CP.'
  - name: Sanctified Amulet
    points: 25
    text: '**ADEPTA SORORITAS** model only. Enemy units that are set up on the battlefield from Reserves
      cannot be set up within 12" of the bearer.'
  stratagems:
  - name: Shield of Denial
    cp: 1
    type: Battle Tactic
    when: Any phase, just after a mortal wound is allocated to an **ADEPTA SORORITAS** unit from your
      army.
    target: That **ADEPTA SORORITAS** unit.
    effect: Until the end of the phase, models in your unit have the Feel No Pain 6+ ability against mortal
      wounds. If your unit is Righteous, until the end of the phase, models in your unit have the Feel
      No Pain 5+ ability against mortal wounds instead.
  - name: Suffer Not The Unfaithful
    cp: 1
    type: Strategic Ploy
    when: Your Shooting phase or the Fight phase.
    target: One **ADEPTA SORORITAS** unit from your army that is Righteous and that has not been selected
      to shoot or fight this phase.
    effect: Select either the **[LETHAL HITS]** or **[SUSTAINED HITS 1]** ability. Until the end of the
      phase, weapons equipped by models in your unit have the selected ability.
  - name: To The Heart Of Heresy
    cp: 1
    type: Battle Tactic
    when: Fight phase.
    target: One **ADEPTA SORORITAS** unit from your army that has not been selected to fight this phase.
    effect: Until the end of the turn, improve the Strength characteristic of melee weapons equipped by
      models in your unit by 1. If your unit is Righteous, until the end of the phase, improve the Armour
      Penetration characteristic of melee weapons equipped by models in your unit by 1 as well.
  - name: Path of the Righteous
    cp: 1
    type: Battle Tactic
    when: Fight phase.
    target: One **ADEPTA SORORITAS** unit from your army that has not been selected to fight this phase.
    effect: Until the end of the turn, each time a model in your unit makes a Pile-in or Consolidation
      move, it can move up to 6" instead of up to 3". When doing so, if your unit is Righteous, it does
      not need to end that move closer to the closest enemy model, provided it ends that move as close
      as possible to the closest enemy unit.
  - name: Bastion of Faith
    cp: 1
    type: Battle Tactic
    when: Fight phase, just after an enemy unit has selected its targets.
    target: One **CELESTIAN SACRESANTS** unit that was selected as the target of one or more of the attacking
      unit’s attacks.
    effect: Until the end of the phase, each time an attack targets your unit, subtract 1 from the Hit
      roll. In addition, if your unit is Righteous, you can select one other **CELESTIAN SACRESANTS**
      unit from your army that is not Battle-shocked and is within 6" of your unit. Until the end of the
      phase, each time an attack targets that **CELESTIAN SACRESANTS** unit, subtract 1 from the Hit roll
      as well.
  - name: Indefatigable Dedication
    cp: 1
    type: Strategic Ploy
    when: Your Movement phase, just after an **ADEPTA SORORITAS** unit from your army Falls Back.
    target: That **ADEPTA SORORITAS** unit.
    effect: Until the end of the turn, your unit is eligible to shoot in a turn in which it Fell Back.
      If your unit is Righteous, until the end of the turn, your unit is eligible to shoot and declare
      a charge in a turn in which it Fell Back instead.
- key: army-of-faith
  name: Army of Faith
  source: codex
  disposition: take-and-hold
  dp: 2
  rule:
    name: Sacred Rites
    text: Each **ADEPTA SORORITAS** unit from your army can perform up to two Acts of Faith per phase,
      instead of just one.
    lore: At times of war, the Adepta Sororitas make offerings to the Emperor in prayer, incense and blood.
      In such pious devotion, they may attract his blessings and enact miraculous deeds in his holy name.
  enhancements:
  - name: Litanies of Faith
    points: 10
    text: '**CANONESS** or **PALATINE** model only. At the start of your Command phase, if the bearer
      is on the battlefield, take a Leadership test for the bearer. If that test is passed, you gain 1
      Miracle dice.'
  - name: Blade of Saint Ellynor
    points: 15
    text: '**ADEPTA SORORITAS** model only. Improve the Strength and Armour Penetration characteristics
      of the bearer’s melee weapons by 1, and those weapons have the **[PRECISION]** ability. In addition,
      each time the bearer fights, if one or more enemy models are destroyed by those attacks, you gain
      1 Miracle dice.'
  - name: Divine Aspect
    points: 5
    text: '**ADEPTA SORORITAS** model only. In your Movement phase, you can select one enemy unit within
      12" of the bearer; that unit must take a Battle-shock test. If that test is failed, you gain 1 Miracle
      dice.'
  - name: Triptych of the Macharian Crusade
    points: 20
    text: '**ADEPTA SORORITAS** model only. Each time the bearer uses an Act of Faith to substitute a
      saving throw, that saving throw is successful, irrespective of the value of the Miracle dice used.'
  stratagems:
  - name: Shield of Faith
    cp: 1
    type: Battle Tactic
    when: Any phase, just after an **ADEPTA SORORITAS** unit from your army suffers a mortal wound.
    target: That **ADEPTA SORORITAS** unit, or one friendly **ADEPTA SORORITAS JUMP PACK** unit within
      3" of it.
    effect: Until the end of the phase, models in your unit have the Feel No Pain 5+ ability against mortal
      wounds. If you targeted an **ADEPTA SORORITAS JUMP PACK** unit from your army with this Stratagem,
      then until the end of the phase, while a friendly **ADEPTA SORORITAS** unit is within 3" of your
      unit, models in that unit have the Feel No Pain 5+ ability against mortal wounds.
  - name: Light of the Emperor
    cp: 1
    type: Battle Tactic
    when: Command phase.
    target: One **ADEPTA SORORITAS** unit from your army.
    effect: 'Until the end of the turn, your unit is blessed. While a unit is blessed, it can ignore any
      or all modifiers to the following: the profile characteristics of its models; the Weapon Skill or
      Ballistic Skill characteristics of weapons equipped by its models; any roll or test made for it
      (excluding modifiers to saving throws). If your unit has the **JUMP PACK** keyword, until the end
      of the turn, while a friendly **ADEPTA SORORITAS** unit is within 3" of your unit, that friendly
      unit is also blessed.'
  - name: Faith and Fury
    cp: 1
    type: Battle Tactic
    when: Fight phase.
    target: One **ADEPTA SORORITAS** unit from your army that has not been selected to fight this phase.
    effect: Until the end of the phase, melee weapons equipped by models in your unit have the **[LANCE]**
      ability. If one or more enemy models are destroyed as the result of your unit’s attacks this phase,
      you gain 1 Miracle dice.
  - name: Blinding Radiance
    cp: 1
    type: Strategic Ploy
    when: Your opponent’s Shooting phase or the Fight phase, just after an enemy unit has selected its
      targets.
    target: One **ADEPTA SORORITAS** unit from your army that was selected as the target of one or more
      of the attacking unit’s attacks, or one friendly **ADEPTA SORORITAS JUMP PACK** unit within 3" of
      such a unit.
    effect: Until the end of the phase, each time an attack targets your unit, subtract 1 from the Hit
      roll. If you targeted an **ADEPTA SORORITAS JUMP PACK** unit from your army with this Stratagem,
      then until the end of the phase, while a friendly **ADEPTA SORORITAS** unit is within 3" of your
      unit, each time an attack targets that unit, subtract 1 from the Hit roll.
  - name: Divine Guidance
    cp: 1
    type: Battle Tactic
    when: Your Shooting phase or the Fight phase.
    target: One **ADEPTA SORORITAS** unit from your army that has not been selected to shoot or fight
      this phase.
    effect: Until the end of the phase, each time a model in your unit makes an attack, improve the Armour
      Penetration characteristic of that attack by 1. If one or more enemy models are destroyed as the
      result of any of those attacks, you gain 1 Miracle dice.
  - name: Angelic Descent
    cp: 1
    type: Strategic Ploy
    when: End of your opponent’s Fight phase.
    target: One **ADEPTA SORORITAS JUMP PACK** unit from your army.
    effect: Remove your unit from the battlefield and place to into Strategic Reserves.
    restriction: You cannot select a unit that is within Engagement Range of one or more enemy units.
- key: penitent-host
  name: Penitent Host
  source: codex
  disposition: take-and-hold
  dp: 2
  rule:
    name: Desperate For Redemption
    text: 'At the start of the battle round, you can select one of the following Vows of Atonement to
      be active for your army until the start of the next battle round. You can only select each Vow of
      Atonement once per battle.


      The Path of the Penitent


      Add 3" to the Move characteristic of **PENITENT** models from your army.


      Absolution in Battle


      Each time a unit from your army is selected to fight, if that unit made a Charge move this turn,
      until the end of the phase, add 1 to the Attacks and Strength characteristics of melee weapons equipped
      by **PENITENT** models in that unit.


      Death Before Disgrace


      Each time a **PENITENT** model from your army is destroyed by a melee attack, if that model has
      not fought this phase, roll one D6. On a 2+, do not remove it from play; the destroyed model can
      fight after the attacking unit has finished making its attacks, and is then removed from play.'
    lore: 'The penitent masses vow to wash clean their dishonour with their foe’s blood.


      With psalms on their lips, the faithful hurl themselves forward.


      The penitents smite the Emperor’s foes with unmatched zeal.


      Even the most grievous wound cannot stop a penitent warrior in their quest to earn redemption in
      the eyes of the Emperor.'
  enhancements:
  - name: Psalm of Righteous Judgement
    points: 30
    text: '**ADEPTA SORORITAS** model only. While the bearer is on the battlefield, each time an enemy
      unit is destroyed by a **PENITENT** unit from your army, you can discard 1 Miracle dice then gain
      1 Miracle dice showing a value of 6.'
  - name: Verse of Holy Piety
    points: 15
    text: '**PENITENT** model only. Once per battle, at the start of the battle round, select one Vow
      of Atonement (see the Desperate for Redemption detachment rule). Until the start of the next battle
      round, that Vow of Atonement is active for the bearer’s unit in addition to any that is active for
      your army, even if you have already selected that Vow of Atonement this battle.'
  - name: Refrain of Enduring Faith
    points: 25
    text: '**PENITENT** model only. While the bearer is leading a unit, models in that unit have a 5+
      invulnerable save.'
  - name: Catechism of Divine Penitence
    points: 20
    text: '**CANONESS**, **PALATINE** or **MINISTORUM PRIEST** model only. The bearer gains the **PENITENT**
      keyword and, during the Declare Battle Formations step, can be attached to a **REPENTIA SQUAD**
      unit.'
  stratagems:
  - name: Final Redemption
    cp: 1
    type: Epic Deed
    when: Any phase.
    target: One **PENITENT** unit from your army that was just destroyed while it was within range of
      an objective marker you controlled. You can use this Stratagem on that unit even though it was just
      destroyed.
    effect: That objective marker remains under your control until your opponent’s Level of Control over
      that objective marker is greater than yours at the end of a phase.
  - name: Purity of Suffering
    cp: 1
    type: Battle Tactic
    when: Your opponent’s Shooting phase or the Fight phase, just after an enemy unit has selected its
      targets.
    target: One **PENITENT** unit from your army that was selected as the target of one or more of the
      attacking unit’s attacks.
    effect: Until the end of the phase, **PENITENT** models in your unit have the Feel No Pain 4+ ability.
  - name: Passion of the Penitent
    cp: 1
    type: Battle Tactic
    when: Fight phase.
    target: One **PENITENT** unit from your army that has not been selected to fight this phase.
    effect: Until the end of the phase, each time a **PENITENT** model in your unit makes a melee attack,
      a successful unmodified Hit roll of 5+ scores a Critical Hit.
  - name: Lash of Guilt
    cp: 1
    type: Battle Tactic
    when: Your Movement phase, just before a **PENITENT** unit from your army Advances.
    target: That **PENITENT** unit.
    effect: Until the end of the turn, your unit is eligible to declare a charge in a turn in which it
      Advanced. If your unit has the **PENITENT ENGINES** keyword, do not make an Advance roll for it;
      instead, until the end of the phase, add 6" to the Move characteristic of models in your unit.
  - name: Boundless Zeal
    cp: 1
    type: Strategic Ploy
    when: Your Movement phase, just after an **ADEPTA SORORITAS** unit from your army Falls Back.
    target: That **ADEPTA SORORITAS** unit.
    effect: Until the end of the turn, your unit is eligible to shoot or declare a charge in a turn in
      which it Fell Back. If your unit has the **PENITENT** keyword, it is eligible to shoot and declare
      a charge in a turn in which it Fell Back instead.
  - name: Devout Fanaticism
    cp: 1
    type: Strategic Ploy
    when: Your opponent’s Shooting phase, just after an enemy unit has shot.
    target: One **PENITENT** unit from your army that was selected as the target as one or more of the
      attacking unit’s attacks.
    effect: Your unit can make a **surge move** of up to D6".
- key: chorus-of-condemnation
  name: Chorus of Condemnation
  source: codex
  disposition: reconnaissance
  dp: 1
  rule:
    name: Angelic Judgement
    text: "Friendly <k>Adepta Sororitas Infantry Fly</k> units have the following ability:\\r\n\n<b>Condemnatory\
      \ Psalms:</b> In your Shooting phase, this unit can select one <b>visible</b> enemy unit within\
      \ 12\". That enemy unit is <b>condemned</b>: \n\\r<li>While a unit is <b>condemned</b>, that unit\
      \ has +3\" <b>detection range</b>. </li>"
    lore: <i>Granted a greater perspective of the heretical foe’s disposition, an Order’s angelic veterans
      roar condemnatory psalms of revelation that unmask the enemy’s evil for all to see.</i>
  enhancements:
  - name: Symphonic Payload (Upgrade)
    points: 10
    text: <k>Exorcist</k> unit only. This unit can re-roll rolls to determine the <b>A</b> of a weapon.
  - name: Clarion of Urgency
    points: 15
    text: <k>Canoness with Jump Pack</k> model only. At the end of your opponent’s Fight phase, if this
      unit is <b>unengaged</b>, you can place this unit in <b>strategic reserves</b>.
  stratagems:
  - name: Devastating Reprise
    cp: 1
    type: null
    when: Your Shooting phase, when a friendly <k>Exorcist</k> unit has shot.
    target: One friendly <k>ADEPTA SORORITAS INFANTRY FLY</k> unit.
    effect: Select one enemy unit (excluding <k>Monster/Vehicle</k> units) hit by those ranged attacks.
      Your unit’s ranged attacks that target that unit have <k>[Devastating Wounds]</k>.
  - name: Harmonised Exorcism
    cp: 1
    type: null
    when: Your Shooting phase, when a friendly <k>Exorcist</k> unit is <b>selected to shoot</b>.
    target: That <k>Exorcist</k> unit.
