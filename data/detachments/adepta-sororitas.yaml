    target: One friendly <k>Adepta Sororitas Infantry Fly</k> unit or one friendly <k>Exorcist</k> unit.
    effect: Select one friendly <b>battle-shocked</b> <k>Adepta Sororitas</k> unit within 6" of your unit.
