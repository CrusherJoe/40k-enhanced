# Primary missions (11th ed) with full VP scoring, from the gdmissions.app
# Chapter Approved Mission Deck card images (front = scoring, back = the
# mission's Objective Action). Each of the 25 missions is what YOU play for a
# given disposition matchup (you vs vs); see matrix.yaml.
#
# scoring: list of blocks. Each block has a `phase` (battle-round window),
# `when` (timing), and `conditions`. A condition's `rel` (relative to the
# previous condition in the block): cumulative | or | (absent = independent,
# both scorable). `special` = a mission-wide rule; `action` = the Objective
# Action from the card reverse (starts/units/use_limit/completes/effect).

- name: Battlefield Dominance
  you: take-and-hold
  vs: take-and-hold
  scoring:
  - phase: First & Second Battle Round
    when: End of your turn
    conditions:
    - text: You control more objectives than your opponent.
      vp: 2
  - phase: Second Battle Round Onwards
    when: End of your Command phase (or the end of your turn in the fifth battle round)
    conditions:
    - text: For each objective you control.
      vp: 3
    - text: For each of those objectives (excluding your home objective) if you control your home objective.
      vp: 2
      rel: cumulative
- name: Determined Acquisition
  you: take-and-hold
  vs: disruption
  scoring:
  - phase: Any Battle Round
    when: End of your turn
    conditions:
    - text: For each objective you control that you did not control at the start of the turn (excluding
        your home objective).
      vp: 2
  - phase: Second Battle Round Onwards
    when: End of your Command phase (or the end of your turn in the fifth battle round)
    conditions:
    - text: For each objective you control.
      vp: 3
    - text: For each of those objectives that is within your opponent's territory.
      vp: 3
      rel: cumulative
- name: Immovable Object
