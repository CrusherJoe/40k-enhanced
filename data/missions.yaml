- name: Punishment
  you: purge-the-foe
  vs: disruption
  special: 'Start of your turn: Select one to three enemy units that are on the battlefield and within
    range of objectives and/or that destroyed one or more friendly units in the previous turn. If you
    cannot, select one enemy unit that is on the battlefield. Until the start of your next turn, those
    units are condemned.'
  scoring:
  - phase: Any Battle Round
    when: End of a turn
    conditions:
    - text: One or more condemned enemy units left the battlefield this turn.
      vp: 5
  - phase: Second Battle Round Onwards
    when: End of your Command phase (or the end of your turn in the fifth battle round)
    conditions:
    - text: You control one or more objectives (excluding your home objective).
      vp: 4
    - text: You control more objectives than your opponent.
      vp: 5
  - phase: End of Battle
    when: End of the battle
    conditions:
    - text: You control your opponent's home objective.
      vp: 8
- name: Consecrate
  you: purge-the-foe
  vs: reconnaissance
  special: Each time a friendly unit destroys a unit, that friendly unit becomes a consecration unit.
    At the end of your turn, for each of your consecration units, you can select one objective it is within
    range of (excluding your home objective) that has not been consecrated. If you do, place one of your
    operation markers within range of that objective - that objective is consecrated and that unit is
    no longer a consecration unit.
  scoring:
  - phase: Any Battle Round
    when: End of your turn
    conditions:
    - text: One or two objectives are consecrated.
      vp: 3
    - text: Three or more objectives are consecrated.
      vp: 6
      rel: or
  - phase: Second Battle Round Onwards
    when: End of your Command phase (or the end of your turn in the fifth battle round)
    conditions:
    - text: You control one or more objectives (excluding your home objective).
      vp: 4
    - text: You control more objectives than your opponent.
      vp: 4
  - phase: End of Battle
    when: End of the battle
    conditions:
    - text: Your opponent's home objective is consecrated.
      vp: 5
