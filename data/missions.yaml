- name: Death Trap
  you: disruption
  vs: take-and-hold
  scoring:
  - phase: Any Battle Round
    when: End of your turn
    conditions:
    - text: For each terrain area trapped this turn.
      vp: 2
    - text: For each of those terrain areas that is an objective.
      vp: 3
      rel: cumulative
  - phase: Any Battle Round
    when: End of your turn
    conditions:
    - text: One or more enemy units that started the turn within a terrain area were destroyed
      if that terrain area is trapped.: null
      vp: 3
  - phase: Second Battle Round Onwards
    when: End of your Command phase (or the end of your turn in the fifth battle round)
    conditions:
    - text: You control one or more objectives (excluding your home objective).
      vp: 4
  action:
    name: Booby Trap
    starts: Your Shooting phase.
    units: One friendly unit within range of one objective (excluding your home objective) or within one
      terrain area that is not within your deployment zone, that you have not yet trapped.
    use_limit: Unlimited. Each unit that starts this action this phase must be within a different terrain
      area.
    completes: Immediately.
    effect: 'That terrain area is trapped: place one of your operation markers within that terrain area.'
