- name: Surveil the Foe
  you: reconnaissance
  vs: disruption
  special: Each time a friendly unit ends a move within range of one objective that has any of your opponent's
    operation markers within range of it, remove those operation markers from the battlefield. (See card
    reverse for how units are surveilled.)
  scoring:
  - phase: Any Battle Round
    when: End of your turn
    conditions:
    - text: One or more enemy units were surveilled this turn, unless each of those units is within range
        of one or more objectives that have one or more operation markers within range of them.
      vp: 4
  - phase: Second Battle Round Onwards
    when: End of your Command phase (or the end of your turn in the fifth battle round)
    conditions:
    - text: You control one or more objectives (excluding your home objective).
      vp: 4
    - text: You control more objectives than your opponent.
      vp: 4
  - phase: Second Battle Round Onwards
    when: End of your turn
    conditions:
    - text: None of your opponent's operation markers are on the battlefield.
      vp: 5
  action:
    name: Surveil the Foe
    starts: Your Shooting phase.
    units: One friendly unit.
    use_limit: Unlimited.
    completes: Immediately.
    effect: 'Select one enemy unit within 18" of and visible to your unit that has not been surveilled
      this turn: until the end of the turn, that enemy unit is surveilled.'
