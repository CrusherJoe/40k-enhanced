# Adepta Sororitas datasheet points — MFM is the source of truth (defer to it
# always unless a specific override is noted). Sisters squads are priced by MODEL
# COUNT and units are 5 OR 10 only (never in between); characters/vehicles are a
# single model. `sizes: {models: points}` gives the exact per-size cost the engine
# prices against; `wargear` entries are PER-MODEL taxes (apply with {name, count}
# in a list). Legacy `points_first` remains as a single-size fallback for units
# not yet verified against the current MFM.

# ---- verified vs current MFM (post 2026-07-22 faction pack) ----
- name: Battle Sisters Squad          # fixed 10-model unit
  sizes: {10: 100}
- name: Dominion Squad                # 10-MODEL ONLY (user); exactly 4 take melta/flamer,
  sizes: {10: 90}                      # then split: 4-wpn half + Superior rides an Immolator (6),
  wargear:                             # other 5 walk. Base 10-model = 90 (MFM, user-confirmed).
  - {name: Meltagun, points: 5}       # per-model tax; max 4 -> +20
  - {name: Flamer, points: 0}         # flamer half: no tax (AP0, Torrent auto-hit vs hordes)
- name: Retributor Squad              # fixed 5-model (Superior + 4 heavy-weapon)
  sizes: {5: 105}
  wargear:
  - {name: Multi-melta, points: 5}    # +5 each (4 = +20 -> 125 all-melta)
  - {name: Heavy bolter, points: 0}   # default heavy weapon, no tax
- name: Celestian Sacresants          # 5 or 10; 4++ battleline
  sizes: {5: 75, 10: 150}
- name: Paragon Warsuits              # fixed 3-model
  sizes: {3: 180}
  wargear:
  - {name: Multi-melta, points: 10}   # +10 each (3 = +30 -> 210 all-melta)
- name: Zephyrim Squad                # 5 or 10; jump 5++
  sizes: {5: 75, 10: 150}
- name: Seraphim Squad                # 5 or 10; jump
  sizes: {5: 75, 10: 150}
