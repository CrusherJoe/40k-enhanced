# FINAL list: Valourstrike + Dominus, Purge the Foe.
# Knights portion validates here (1925); a Navigator ally (60, home anchor) brings
# the full army to 1985/2000 -- the tool can't validate allies, see data/allies/agents.yaml.
#   PYTHONPATH=src python3 -m wh build examples/best-purge-the-foe.yaml
name: FINAL - Valourstrike + Dominus (Purge the Foe) + Navigator
detachments: [valourstrike-lance, dominus-foebreakers]
disposition: purge-the-foe
units:
  # Enhancements sit on the 3 big Knights (Armigers aren't Characters). The two
  # DOMINUS enhancements must go on Castellans; Judicant (buffs ANOTHER model) goes
  # on the Crusader so BOTH Castellans keep their self-buffs.
  - {datasheet: Knight Castellan, count: 1, enhancement: Archeotech Autoloaders}   # variance fix: re-roll casino dice
  - {datasheet: Knight Castellan, count: 1, enhancement: Blessed Plate}            # T13 durability
  - {datasheet: Knight Crusader, count: 1, wargear: [Rapid-fire battle cannon],
     enhancement: Bearer of the Judicant's Helm}                                   # feeds IGNORES COVER to a Castellan each Shooting phase
  - {datasheet: Armiger Helverin, count: 2}
  - {datasheet: Armiger Warglaive, count: 2}
  # + Navigator (Imperial Agents, 60 pts) -- home-objective anchor, Hidden + Gone to
  #   Ground + anti-Deep-Strike bubble. Brings the army to 1985/2000. See data/allies/.
