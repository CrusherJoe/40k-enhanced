# ============================================================================
# BEST SISTERS — take-all-comers, v2 (MATHHAMMER-REVISED). Points exact (MFM).
#
# The mathhammer (docs/sisters-battle-plan.md) reshaped v1:
#  - The BUFF CHAIN is a ~4x multiplier: naked melta into cover ~4.6 dmg vs a
#    Land Raider; de-covered(Immolator) + AP+1(Castigator) + reroll(Vahl) +
#    BS2+(Righteous) = ~17.8 (one-shots it). The enablers ARE the anti-tank.
#  - Melta was OVER-invested (5 packages, ~45 dmg = 3x overkill on one target).
#    Trim to 3 (Vahl+Paragons, MM-Retributor, 1 melta Dominion) and reinvest.
#  - REINVEST into anti-horde + reliability + durability:
#      * Immolators: twin-MM -> IMMOLATION FLAMERS (auto-hit reliably triggers
#        Purge & Cleanse; +~8 dead Boyz/turn; melta overkill means ~0 AT lost).
#      * 1 Dominion: melta -> FLAMER (+~5 dead Boyz/turn).
#      * Add IMAGIFIER support (Stanchion: its unit is Sv2+/4++) on the MM
#        Retributor -> a durable Lethal-Hits anti-tank firebase.
#
# DETACHMENT: Champions of Faith (2DP, Disruption) + Sacred Champions (1DP,
# Take-and-Hold). Righteous Purpose (+1 BS on PARAGONS) + Vahl re-rolls land on
# the melta hammer; Holy Quest (+1 BS/WS) on the Sacresant anchor.
#
# ATTACHMENTS (Leader + Support per unit, 19.01; tool prices only, doesn't model):
#   Vahl -> Paragons (re-roll H&W + Righteous +1 BS)
#   Canoness[Sanctified Amulet, anti-Deep-Strike] + Dogmata[+1 OC] -> Sacresants
#   Palatine[Lethal Hits] + Imagifier[Sv2+/4++] -> Multi-melta Retributor
#
#   PYTHONPATH=src python3 -m wh --faction sisters build examples/best-sisters-allcomers.yaml
# ============================================================================
name: BEST Sisters v2 - Champions of Faith + Sacred Champions (all-comers)
detachments: [champions-of-faith, sacred-champions]
disposition: disruption          # take-and-hold also available from the combo

units:
  # --- THE MELTA HAMMER (buffed): Vahl+Paragons one-shot a softened anchor ---
  - {datasheet: Morvenn Vahl, models: 1}                                          # 200; re-roll H&W for the Paragon unit
  - {datasheet: Paragon Warsuits, models: 3, wargear: [{name: Multi-melta, count: 3}]}  # 210; BS2+ w/ Righteous, half-range Melta2

  # --- DURABLE LETHAL-HITS AT FIREBASE: Palatine + Imagifier attach here ---
  - {datasheet: Retributor Squad, models: 5, wargear: [{name: Multi-melta, count: 4}]}  # 125; 8 MM shots, becomes 2+/4++ + Lethal Hits
  - {datasheet: Palatine, models: 1, enhancement: Triptych of Judgement}          # 50+15; Leader -> Lethal Hits + unit IGNORES cover-to-hit modifiers
  - {datasheet: Imagifier, models: 1}                                             # 65; Support -> that unit is Sv2+/4++

  # --- TARGET-SOFTENING ENABLERS (army-wide) + anti-horde ---
  - {datasheet: Castigator, models: 1}                                            # 165; Rites of Castigation = +1 AP vs a marked target; Blast anti-horde
  - {datasheet: Immolator, models: 1}                                             # 110; IMMOLATION FLAMERS -> auto-hit triggers Purge & Cleanse (strip cover)
  - {datasheet: Immolator, models: 1}                                             # 110; IMMOLATION FLAMERS -> 2nd cover-strip + anti-horde

  # --- MELTA + FLAMER DELIVERY (split: 4-wpn half + Superior rides an Immolator) ---
  - {datasheet: Dominion Squad, models: 10, wargear: [{name: Meltagun, count: 4}]}  # 110; AT melta half
  - {datasheet: Dominion Squad, models: 10, wargear: [{name: Flamer, count: 4}]}     # 90; anti-horde flamer half

  # --- ANTI-HORDE FIREBASE ---
  - {datasheet: Retributor Squad, models: 5, wargear: [{name: Heavy bolter, count: 4}]}  # 105; 12 shots vs W1-2 bodies

  # --- DURABLE OC ANCHOR: Canoness (anti-DS) + Dogmata (+1 OC) attach here ---
  - {datasheet: Celestian Sacresants, models: 10}                                 # 150; 4++, Holy Quest +1 BS/WS; the mid-board holder
  - {datasheet: Canoness, models: 1, enhancement: Sanctified Amulet}              # 85; Leader -> anti-Deep-Strike bubble
  - {datasheet: Dogmata, models: 1}                                               # 45; Support -> +1 OC on the Sacresants

  # --- CHEAP OC BODIES + JUMP MOBILITY (out-OC + the mission/action game) ---
  - {datasheet: Battle Sisters Squad, models: 10}                                 # 100; OC2 bodies, split/screen
  - {datasheet: Battle Sisters Squad, models: 10}                                 # 100; more OC -- out-OC the elite bricks
  - {datasheet: Zephyrim Squad, models: 5}                                        # 75; jump 5++, hand flamers; contest/counter-charge
  - {datasheet: Seraphim Squad, models: 5}                                        # 75; jump; actions + chaff-clear
